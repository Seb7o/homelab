---
# Default values for the node_exporter role

node_exporter_version: "1.8.2"
node_exporter_user: "node_exporter"
node_exporter_group: "node_exporter"
node_exporter_install_dir: "/usr/local/bin"
node_exporter_binary_path: "{{ node_exporter_install_dir }}/node_exporter"
node_exporter_listen_address: ":9100"
node_exporter_systemd_unit_path: "/etc/systemd/system/node_exporter.service"

node_exporter_archive_name: "node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
node_exporter_download_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_archive_name }}.tar.gz"

node_exporter_tmp_dir: "/tmp"
node_exporter_archive_path: "{{ node_exporter_tmp_dir }}/{{ node_exporter_archive_name }}.tar.gz"
node_exporter_extract_path: "{{ node_exporter_tmp_dir }}/{{ node_exporter_archive_name }}"

node_exporter_mount_points_exclude: "^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)"
node_exporter_filesystem_types_exclude: "^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|tmpfs)$"

node_exporter_extra_args: []
